<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://openweathermap.org/api/js/weather-widget.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Weather Dashboard</h1>
        <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
        <button id="search-btn">Search</button>
        <div id="current-weather"></div>
        <div id="forecast"><h2>5-Day Forecast</h2></div>
    </div>
    <script>
        const apiKey = 'YOUR_API_KEY';
        const currentWeather = async (city) => {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
            const data = await response.json();
            displayCurrentWeather(data);
        };
        const displayCurrentWeather = (data) => {
            const weatherDiv = document.getElementById('current-weather');
            weatherDiv.innerHTML = `<h3>${data.name}</h3>
                                   <p>${data.weather[0].description}</p>
                                   <p>Temperature: ${data.main.temp}°C</p>`;
        };
        document.getElementById('search-btn').onclick = function() {
            const city = document.getElementById('city-input').value;
            currentWeather(city);
        };
    </script>
</body>
</html>
