<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .weather-section { margin-bottom: 20px; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <h1>Weather Dashboard</h1>

    <div class="weather-section">
        <h2>Weather Search</h2>
        <input type="text" id="location" placeholder="Enter location" />
        <button id="search-btn">Search</button>
    </div>

    <div class="weather-section" id="current-weather">
        <h2>Current Weather</h2>
        <p id="current-weather-display"></p>
    </div>

    <div class="weather-section" id="five-day-forecast">
        <h2>5-Day Forecast</h2>
        <div id="forecast-display"></div>
    </div>

    <div class="weather-section" id="hourly-forecast">
        <h2>Hourly Forecast</h2>
        <div id="hourly-display"></div>
    </div>

    <script>
        // JavaScript for handling weather search and displaying data would go here
    </script>
</body>
</html>
