<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <script>
        function saveData() {
            const name = document.getElementById('name').value;
            const rollNumber = document.getElementById('rollNumber').value;
            const group = document.getElementById('group').value;

            const attendanceData = {
                name: name,
                rollNumber: rollNumber,
                group: group,
                timestamp: new Date().toISOString()
            };

            let allData = JSON.parse(localStorage.getItem('attendanceData')) || [];
            allData.push(attendanceData);
            localStorage.setItem('attendanceData', JSON.stringify(allData));

            alert('Data saved successfully!');
        }

        function downloadData() {
            const data = localStorage.getItem('attendanceData');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'attendanceData.json';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</head>
<body>
    <h1>Attendance System</h1>
    <form onsubmit="event.preventDefault(); saveData();">
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        <br>
        <label for="rollNumber">Roll Number:</label>
        <input type="text" id="rollNumber" required>
        <br>
        <label for="group">Group:</label>
        <select id="group" required>
            <option value="MJC">MJC</option>
            <option value="MIC">MIC</option>
        </select>
        <br>
        <button type="submit">Submit</button>
    </form>
    <button onclick="downloadData()">Download Attendance Data</button>
</body>
</html>
